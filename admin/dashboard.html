<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root { --sidebar-width: 240px; }
        body { background-color: #f4f9f6; overflow-x: hidden; }

        /* Sidebar */
        .sidebar {
            height: 100vh; background-color: #198754; padding-top: 20px;
            position: fixed; width: var(--sidebar-width); z-index: 1000; transition: 0.3s;
        }
        .sidebar a { color: white; padding: 12px 20px; display: block; text-decoration: none; transition: 0.3s; }
        .sidebar a:hover { background-color: rgba(255, 255, 255, 0.2); }
        .sidebar .active { background-color: rgba(255, 255, 255, 0.3); }

        /* Main Content */
        .main-content { margin-left: var(--sidebar-width); padding: 30px; transition: 0.3s; }

        @media (max-width: 991px) {
            .sidebar { left: -100%; }
            .sidebar.active-mobile { left: 0; }
            .main-content { margin-left: 0; }
            #mobileToggle { display: block; }
        }

        /* Cards */
        .dashboard-card { border-radius: 15px; padding: 25px; color: white; transition: 0.3s; height: 100%; }
        .dashboard-card:hover { transform: translateY(-5px); }
        .card-green { background-color: #198754; }
        .card-blue { background-color: #0d6efd; }
        .card-orange { background-color: #fd7e14; }
        .card-red { background-color: #dc3545; }
        .card-secondary { background-color: #6c757d; }

        .quick-btn { padding: 12px 30px; font-size: 16px; margin-bottom: 10px; }
        #mobileToggle { display: none; position: fixed; top: 15px; right: 15px; z-index: 1100; }
        
        /* Live Pulse Animation */
        .pulse { animation: pulse-red 2s infinite; color: #198754; }
        @keyframes pulse-red {
            0% { transform: scale(0.95); opacity: 0.7; }
            70% { transform: scale(1); opacity: 1; }
            100% { transform: scale(0.95); opacity: 0.7; }
        }
    </style>
</head>

<body>

    <button id="mobileToggle" class="btn btn-success"><i class="fa-solid fa-bars"></i></button>

    <div class="sidebar" id="sidebar">
        <h4 class="text-white text-center mb-4">NACOS Admin</h4>
        <a href="dashboard.html" class="active"><i class="fa-solid fa-gauge me-2"></i> Dashboard</a>
        <a href="form.html" id="sideCandidateLink"><i class="fa-solid fa-user-plus me-2"></i> Add Candidate</a>
        <a href="categories.html"><i class="fa-solid fa-list me-2"></i> Categories</a>
        <a href="result.html"><i class="fa-solid fa-chart-column me-2"></i> View Results</a>
        <a href="javascript:void(0)" onclick="logout()"><i class="fa-solid fa-right-from-bracket me-2"></i> Logout</a>
    </div>

    <div class="main-content">
        <div class="mb-4">
            <h2 class="mb-0">Admin Dashboard</h2>
            <!-- Dynamic Election Name Display -->
            <p id="activeElectionDisplay" class="mt-2 fw-bold" style="display: none;">
                <i class="fa-solid fa-circle pulse small me-1"></i> 
                Active Election: <span id="activeTitleText" class="text-success">...</span>
            </p>
        </div>

        <div class="row g-4 mb-5">
            <div class="col-6 col-lg-3">
                <div class="dashboard-card card-green text-center">
                    <i class="fa-solid fa-users fa-2x mb-2"></i>
                    <h4 id="totalVoters">...</h4>
                    <p>Total Voters</p>
                </div>
            </div>
            <div class="col-6 col-lg-3">
                <div class="dashboard-card card-blue text-center">
                    <i class="fa-solid fa-user-tie fa-2x mb-2"></i>
                    <h4 id="totalCandidates">0</h4>
                    <p>Candidates</p>
                </div>
            </div>
            <div class="col-6 col-lg-3">
                <div class="dashboard-card card-orange text-center">
                    <i class="fa-solid fa-check-circle fa-2x mb-2"></i>
                    <h4 id="totalVotes">0</h4>
                    <p>Votes Cast</p>
                </div>
            </div>
            <div class="col-6 col-lg-3">
                <div id="statusCard" class="dashboard-card card-red text-center">
                    <i class="fa-solid fa-clock fa-2x mb-2"></i>
                    <h4 id="electionStatus" style="font-size: 1.1rem;">Loading...</h4>
                    <p>Status</p>
                </div>
            </div>
        </div>

        <div class="card p-4 shadow-sm rounded-4">
            <h5 class="mb-4">Quick Actions</h5>
            <div class="d-flex flex-wrap" id="actionButtons">
                <a href="form.html" id="btnCandidate" class="btn btn-success quick-btn me-2 flex-grow-1">
                    <i class="fa-solid fa-user-plus me-1"></i> Add Candidate
                </a>
                <a href="result.html" class="btn btn-primary quick-btn me-2 flex-grow-1">
                    <i class="fa-solid fa-chart-column me-1"></i> View Results
                </a>
                <!-- Dynamic Button: Setup OR Stop -->
                <button id="btnSetupToggle" class="btn btn-danger quick-btn flex-grow-1" data-bs-toggle="modal" data-bs-target="#setupElectionModal">
                    <i class="fa-solid fa-play me-1"></i> Setup Election
                </button>
            </div>
        </div>
    </div>

    <!-- MODAL -->
    <div class="modal fade" id="setupElectionModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content rounded-4 shadow border-0">
                <div class="modal-header border-0">
                    <h5 class="modal-title font-bold"><i class="fa-solid fa-gear me-2 text-success"></i>Setup New Election</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <form id="electionSetupForm">
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label text-muted small fw-bold text-uppercase">Election Title</label>
                            <input type="text" id="electionTitle" class="form-control form-control-lg bg-light border-0" placeholder="e.g. NACOS 2024/2025" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-muted small fw-bold text-uppercase">Duration (Hours)</label>
                            <input type="number" id="electionDuration" class="form-control form-control-lg bg-light border-0" placeholder="e.g. 24" min="1" required>
                        </div>
                        <p class="text-danger small"><i class="fa-solid fa-circle-info me-1"></i> This will open the voting gates immediately.</p>
                    </div>
                    <div class="modal-footer border-0">
                        <button type="button" class="btn btn-light px-4" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" id="setupBtn" class="btn btn-success px-4 shadow-sm">
                            <span id="setupBtnText">Initialize Election</span>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const token = localStorage.getItem('adminToken');
            if (!token) { window.location.href = 'login.html'; return; }

            // Sidebar Toggle
            document.getElementById('mobileToggle').addEventListener('click', () => {
                document.getElementById('sidebar').classList.toggle('active-mobile');
            });

            const headers = { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' };

            try {
                const [votersRes, partRes, votesRes, dashRes] = await Promise.all([
                    fetch('https://voting-api-guwf.onrender.com/api/admin/totalvoters', { headers }),
                    fetch('https://voting-api-guwf.onrender.com/api/admin/totalparticipants', { headers }),
                    fetch('https://voting-api-guwf.onrender.com/api/admin/totalvotes', { headers }),
                    fetch('https://voting-api-guwf.onrender.com/api/admin/dashboard', { headers })
                ]);

                const vData = await votersRes.json();
                const pData = await partRes.json();
                const vtData = await votesRes.json();
                const dData = await dashRes.json();

                document.getElementById('totalVoters').innerText = vData.count || 0;
                document.getElementById('totalCandidates').innerText = pData.count || 0;
                document.getElementById('totalVotes').innerText = vtData.total_votes || 0;

                // Handle Election State & Title Display
                const results = dData.results;
                const status = results.electionStatus; 
                const eTitle = results.electionTitle || "Ongoing Election";
                
                const statusEl = document.getElementById('electionStatus');
                const statusCard = document.getElementById('statusCard');
                const btnCandidate = document.getElementById('btnCandidate');
                const sideCandidate = document.getElementById('sideCandidateLink');
                const btnSetupToggle = document.getElementById('btnSetupToggle');
                const activeDisplay = document.getElementById('activeElectionDisplay');
                const activeTitleText = document.getElementById('activeTitleText');

                statusEl.innerText = status;

                if (status === "Active" || status === "Open") {
                    // Update Title Display
                    activeTitleText.innerText = eTitle;
                    activeDisplay.style.display = 'block';

                    statusCard.classList.replace('card-red', 'card-green'); 
                    
                    // Disable candidate additions
                    [btnCandidate, sideCandidate].forEach(el => {
                        el.classList.add('disabled', 'opacity-50');
                        el.style.pointerEvents = 'none';
                        if(el.id === 'btnCandidate') el.innerHTML = `<i class="fa-solid fa-lock me-1"></i> Add Locked`;
                    });

                    // Transform Setup button into "Stop" button
                    btnSetupToggle.innerHTML = `<i class="fa-solid fa-circle-stop me-1"></i> Stop Election`;
                    btnSetupToggle.classList.replace('btn-danger', 'btn-dark');
                    btnSetupToggle.removeAttribute('data-bs-toggle'); 
                    btnSetupToggle.onclick = () => stopElectionManual();
                } else {
                    activeDisplay.style.display = 'none';
                    statusCard.classList.replace('card-red', 'card-secondary');
                    btnSetupToggle.classList.replace('btn-danger', 'btn-warning');
                }

            } catch (err) { console.error(err); }
        });

        async function stopElectionManual() {
            if(!confirm("Warning: This will close the election immediately. Continue?")) return;
            const token = localStorage.getItem('adminToken');
            try {
                const res = await fetch('https://voting-api-guwf.onrender.com/api/admin/stop-election', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if(res.ok) { alert("Election Stopped Successfully"); location.reload(); }
                else { alert("Failed to stop election."); }
            } catch (e) { alert("Error connecting to server."); }
        }

        document.getElementById('electionSetupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const setupBtn = document.getElementById('setupBtn');
            const data = {
                title: document.getElementById('electionTitle').value,
                durationHours: parseInt(document.getElementById('electionDuration').value)
            };

            setupBtn.disabled = true;
            try {
                const res = await fetch('https://voting-api-guwf.onrender.com/api/admin/setup', {
                    method: 'POST',
                    headers: { 
                        'Authorization': `Bearer ${localStorage.getItem('adminToken')}`,
                        'Content-Type': 'application/json' 
                    },
                    body: JSON.stringify(data)
                });
                if (res.ok) { alert("Election Started!"); location.reload(); }
                else { const err = await res.json(); alert(err.message); }
            } catch (err) { alert("Server error"); }
            finally { setupBtn.disabled = false; }
        });

        function logout() {
            if(confirm("Logout?")) { localStorage.removeItem('adminToken'); window.location.href = 'login.html'; }
        }
    </script>
</body>
</html>
