<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root {
            --sidebar-width: 240px;
        }

        body {
            background-color: #f4f9f6;
            overflow-x: hidden;
        }

        /* Sidebar */
        .sidebar {
            height: 100vh;
            background-color: #198754;
            padding-top: 20px;
            position: fixed;
            width: var(--sidebar-width);
            z-index: 1000;
            transition: 0.3s;
        }

        .sidebar a {
            color: white;
            padding: 12px 20px;
            display: block;
            text-decoration: none;
            transition: 0.3s;
        }

        .sidebar a:hover { background-color: rgba(255, 255, 255, 0.2); }
        .sidebar .active { background-color: rgba(255, 255, 255, 0.3); }

        /* Main Content */
        .main-content {
            margin-left: var(--sidebar-width);
            padding: 30px;
            transition: 0.3s;
        }

        /* Responsive Sidebar Logic */
        @media (max-width: 991px) {
            .sidebar {
                left: -100%; /* Hide off-screen */
            }
            .sidebar.active-mobile {
                left: 0;
            }
            .main-content {
                margin-left: 0;
            }
        }

        /* Cards */
        .dashboard-card {
            border-radius: 15px;
            padding: 25px;
            color: white;
            transition: 0.3s;
            height: 100%;
        }

        .dashboard-card:hover { transform: translateY(-5px); }
        .card-green { background-color: #198754; }
        .card-blue { background-color: #0d6efd; }
        .card-orange { background-color: #fd7e14; }
        .card-red { background-color: #dc3545; }

        .quick-btn {
            padding: 12px 30px;
            font-size: 16px;
            margin-bottom: 10px;
        }

        /* Hamburger Toggle (Mobile Only) */
        #mobileToggle {
            display: none;
            position: fixed;
            top: 15px;
            right: 15px;
            z-index: 1100;
        }

        @media (max-width: 991px) {
            #mobileToggle { display: block; }
        }
    </style>
</head>

<body>

    <!-- MOBILE TOGGLE -->
    <button id="mobileToggle" class="btn btn-success">
        <i class="fa-solid fa-bars"></i>
    </button>

    <!-- SIDEBAR -->
    <div class="sidebar" id="sidebar">
        <h4 class="text-white text-center mb-4">NACOS Admin</h4>
        <a href="dashboard.html" class="active"><i class="fa-solid fa-gauge me-2"></i> Dashboard</a>
        <a href="form.html"><i class="fa-solid fa-user-plus me-2"></i> Add Candidate</a>
        <a href="categories.html"><i class="fa-solid fa-list me-2"></i> Categories</a>
        <a href="result.html"><i class="fa-solid fa-chart-column me-2"></i> View Results</a>
        <!-- Use javascript:void(0) to prevent page reload -->
        <a href="javascript:void(0)" onclick="logout()">
            <i class="fa-solid fa-right-from-bracket me-2"></i> Logout
        </a>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main-content">
        <h2 class="mb-4">Admin Dashboard</h2>

        <div class="row g-4 mb-5">
            <div class="col-6 col-lg-3">
                <div class="dashboard-card card-green text-center">
                    <i class="fa-solid fa-users fa-2x mb-2"></i>
                    <h4 id="totalVoters">loading...</h4> <!-- Hardcoded for now as per your view -->
                    <p>Total Voters</p>
                </div>
            </div>

            <div class="col-6 col-lg-3">
                <div class="dashboard-card card-blue text-center">
                    <i class="fa-solid fa-user-tie fa-2x mb-2"></i>
                    <h4 id="totalCandidates">0</h4>
                    <p>Candidates</p>
                </div>
            </div>

            <div class="col-6 col-lg-3">
                <div class="dashboard-card card-orange text-center">
                    <i class="fa-solid fa-check-circle fa-2x mb-2"></i>
                    <h4 id="totalVotes">0</h4>
                    <p>Votes Cast</p>
                </div>
            </div>

            <div class="col-6 col-lg-3">
                <div class="dashboard-card card-red text-center">
                    <i class="fa-solid fa-clock fa-2x mb-2"></i>
                    <h4 id="electionStatus" style="font-size: 1.1rem;">Loading...</h4>
                    <p>Status</p>
                </div>
            </div>
        </div>

        <div class="card p-4 shadow-sm rounded-4">
            <h5 class="mb-4">Quick Actions</h5>
            <div class="d-flex flex-wrap">
                <a href="form.html" class="btn btn-success quick-btn me-2 flex-grow-1">
                    <i class="fa-solid fa-user-plus me-1"></i> Add Candidate
                </a>
                <a href="result.html" class="btn btn-primary quick-btn me-2 flex-grow-1">
                    <i class="fa-solid fa-chart-column me-1"></i> View Results
                </a>
                <a href="#" class="btn btn-warning quick-btn flex-grow-1">
                    <i class="fa-solid fa-users me-1"></i> Manage Voters
                </a>
            </div>
        </div>
    </div>
<script>
    document.addEventListener('DOMContentLoaded', async () => {
        const token = localStorage.getItem('adminToken');

        // Sidebar Toggle for Mobile
        const toggleBtn = document.getElementById('mobileToggle');
        const sidebar = document.getElementById('sidebar');
        
        toggleBtn.addEventListener('click', () => {
            sidebar.classList.toggle('active-mobile');
        });

        // Protection: Redirect if no token
        if (!token) {
            window.location.href = 'login.html';
            return;
        }

        // Fetch Stats
        try {
            const headers = { 
                'Authorization': `Bearer ${token}`,
                'Content-Type': 'application/json'
            };

            // 1. Fetch Total Voters (The new route we added)
            const resVoters = await fetch('https://voting-api-guwf.onrender.com/api/admin/totalvoters', { headers });
            const dataVoters = await resVoters.json();

            // 2. Fetch Total Participants
            const resParticipants = await fetch('https://voting-api-guwf.onrender.com/api/admin/totalparticipants', { headers });
            const dataParticipants = await resParticipants.json();
            
            // 3. Fetch Total Votes
            const resVotes = await fetch('https://voting-api-guwf.onrender.com/api/admin/totalvotes', { headers });
            const dataVotes = await resVotes.json();

            // 4. Fetch Dashboard/Election Status
            const resDashboard = await fetch('https://voting-api-guwf.onrender.com/api/admin/dashboard', { headers });
            const dataDashboard = await resDashboard.json();

            // --- Update UI ---
            
            // Total Voters Card
            if (resVoters.ok) {
                document.getElementById('totalVoters').innerText = dataVoters.count.toLocaleString();
            }

            // Candidates Card
            if (resParticipants.ok) {
                document.getElementById('totalCandidates').innerText = dataParticipants.count;
            }

            // Votes Cast Card
            if (resVotes.ok) {
                document.getElementById('totalVotes').innerText = dataVotes.total_votes;
            }

            // Status Card
            if (resDashboard.ok) {
                const status = dataDashboard.results.electionStatus;
                const statusEl = document.getElementById('electionStatus');
                statusEl.innerText = status;
                
                // Optional: Change status color based on state
                if(status === "Closed") {
                    statusEl.parentElement.classList.replace('card-red', 'card-secondary');
                }
            }

        } catch (err) {
            console.error("Dashboard Sync Error:", err);
            // Optional: Show error on UI
            document.getElementById('electionStatus').innerText = "Offline";
        }
    });

    // Handle Logout
    function logout() {
        if(confirm("Are you sure you want to logout?")) {
            localStorage.removeItem('adminToken');
            window.location.href = 'login.html'; 
        }
    }
</script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
