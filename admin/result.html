<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Voting Results</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root {
            --primary: #0a7d2c;
            --secondary: #f4f9f6;
            --sidebar-width: 240px;
        }

        body {
            background: var(--secondary);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
        }

        /* Sidebar Styles */
        .sidebar {
            height: 100vh;
            background-color: var(--primary);
            padding-top: 20px;
            position: fixed;
            width: var(--sidebar-width);
            left: 0;
            top: 0;
            z-index: 1000;
            transition: 0.3s;
        }

        .sidebar a {
            color: white;
            padding: 12px 20px;
            display: block;
            text-decoration: none;
            transition: 0.3s;
        }

        .sidebar a:hover { background-color: rgba(255, 255, 255, 0.2); }
        .sidebar .active { background-color: rgba(255, 255, 255, 0.3); }

        /* Main Content Area */
        .main-content {
            margin-left: var(--sidebar-width);
            padding: 30px;
            transition: 0.3s;
            min-height: 100vh;
        }

        /* Mobile Adjustments */
        #mobileToggle {
            display: none;
            position: fixed;
            top: 15px;
            right: 15px;
            z-index: 1100;
        }

        @media (max-width: 991px) {
            .sidebar { left: -100%; }
            .sidebar.active-mobile { left: 0; }
            .main-content { margin-left: 0; padding: 20px; padding-top: 60px; }
            #mobileToggle { display: block; }
            footer { margin-left: 0 !important; }
        }

        .section-title {
            color: var(--primary);
            font-weight: bold;
            border-bottom: 2px solid var(--primary);
            display: inline-block;
            padding-bottom: 5px;
        }

        /* Result Card Styles */
        .result-card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.05);
            transition: 0.3s;
            height: 100%;
        }

        .result-card:hover { transform: translateY(-5px); }

        /* Progress Circle */
        .circle {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: auto;
            position: relative;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.1);
        }

        .circle img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            z-index: 1;
            object-fit: cover;
            border: 3px solid white;
        }

        .percentage-badge {
            position: absolute;
            bottom: -5px;
            right: 10px;
            z-index: 3;
            background: white;
            color: var(--primary);
            font-weight: bold;
            padding: 2px 8px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            font-size: 14px;
        }

        footer {
            margin-left: var(--sidebar-width);
            padding: 20px;
            text-align: center;
            background: var(--primary);
            color: white;
        }
    </style>
</head>

<body>

    <!-- MOBILE TOGGLE -->
    <button id="mobileToggle" class="btn btn-success">
        <i class="fa-solid fa-bars"></i>
    </button>

    <!-- SIDEBAR -->
    <div class="sidebar" id="sidebar">
        <h4 class="text-white text-center mb-4">NACOS Admin</h4>
        <a href="dashboard.html"><i class="fa-solid fa-gauge me-2"></i> Dashboard</a>
        <a href="form.html"><i class="fa-solid fa-user-plus me-2"></i> Add Candidate</a>
        <a href="categories.html"><i class="fa-solid fa-list me-2"></i> Categories</a>
        <a href="result.html" class="active"><i class="fa-solid fa-chart-column me-2"></i> View Results</a>
        <a href="javascript:void(0)" onclick="logout()">
            <i class="fa-solid fa-right-from-bracket me-2"></i> Logout
        </a>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main-content">
        <div class="container-fluid">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3>Election Insights</h3>
                <span class="text-muted small"><i class="fa-solid fa-sync fa-spin me-1"></i> Auto-refreshing</span>
            </div>
            
            <div id="resultsContainer">
                <div class="text-center py-5">
                    <div class="spinner-border text-success" role="status"></div>
                    <p class="mt-3 text-muted">Analyzing live data...</p>
                </div>
            </div>
        </div>
    </div>

    <footer>
        &copy; 2026 NACOS Computer Science | Election Result System
    </footer>

    <script>
        const token = localStorage.getItem('adminToken');
        if (!token) window.location.href = 'login.html';

        // Mobile Toggle logic
        const mobileToggle = document.getElementById('mobileToggle');
        const sidebar = document.getElementById('sidebar');
        mobileToggle.addEventListener('click', () => {
            sidebar.classList.toggle('active-mobile');
        });

        async function fetchLiveResults() {
            try {
                const response = await fetch('http://localhost:3000/api/admin/dashboard', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const result = await response.json();

                if (result.status === "success" && result.results?.results) {
                    renderResults(result.results.results);
                }
            } catch (err) {
                document.getElementById('resultsContainer').innerHTML = 
                    `<div class="alert alert-danger">Connection lost. Retrying...</div>`;
            }
        }

        function renderResults(data) {
            const container = document.getElementById('resultsContainer');
            container.innerHTML = ''; 

            if (data.length === 0) {
                container.innerHTML = '<div class="alert alert-info text-center">No categories found yet.</div>';
                return;
            }

            const categories = {};
            data.forEach(item => {
                if (!categories[item.category]) categories[item.category] = [];
                categories[item.category].push(item);
            });

            for (const categoryName in categories) {
                const candidates = categories[categoryName];
                const categoryTotal = candidates.reduce((sum, c) => sum + (c.votes || 0), 0);
                const maxVotes = Math.max(...candidates.map(c => c.votes || 0));

                const section = document.createElement('div');
                section.className = 'mb-5';
                section.innerHTML = `
                    <div class="d-flex justify-content-between align-items-end mb-4 border-bottom pb-2">
                        <h4 class="section-title mb-0">${categoryName}</h4>
                        <span class="text-success fw-bold">${categoryTotal} Votes Cast</span>
                    </div>
                `;

                const row = document.createElement('div');
                row.className = 'row g-4 justify-content-center'; // g-4 adds gutter spacing

                candidates.forEach(can => {
                    const percentage = categoryTotal > 0 ? Math.round((can.votes / categoryTotal) * 100) : 0;
                    const isLeading = can.votes === maxVotes && maxVotes > 0;

                    row.innerHTML += `
                        <div class="col-12 col-sm-6 col-lg-4 col-xl-3">
                            <div class="result-card ${isLeading ? 'border border-success' : ''}" style="position: relative;">
                                ${isLeading ? '<span class="badge bg-warning text-dark" style="position: absolute; top: -10px; left: 50%; transform: translateX(-50%); z-index:10;"><i class="fa-solid fa-crown me-1"></i>Winner</span>' : ''}
                                
                                <div class="circle" style="background: conic-gradient(var(--primary) 0% ${percentage}%, #e9ecef ${percentage}% 100%);">
                                    <img src="${can.profileImage}" alt="${can.name}">
                                    <div class="percentage-badge">${percentage}%</div>
                                </div>

                                <div class="text-center mt-3">
                                    <h5 class="mb-1 text-dark">${can.name}</h5>
                                    <div class="h4 mb-0 text-success fw-bold">${can.votes}</div>
                                    <div class="text-muted small">Total Votes</div>
                                    <hr class="my-2 mx-auto w-25">
                                    <div class="badge bg-light text-dark">${can.level}</div>
                                </div>
                            </div>
                        </div>
                    `;
                });
                section.appendChild(row);
                container.appendChild(section);
            }
        }

        function logout() {
            if(confirm("Logout from Admin Panel?")) {
                localStorage.removeItem('adminToken');
                window.location.href = 'login.html';
            }
        }

        fetchLiveResults();
        setInterval(fetchLiveResults, 15000); // Refreshes every 15 seconds
    </script>
</body>
</html>
