<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NACOS Election - Cast Vote</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { background-color: #f4f9f6; }
        .navbar-custom { background-color: #198754; }
        .section-title { background-color: #198754; color: white; padding: 10px; border-radius: 8px; margin-top: 40px; text-align: center; }
        .vote-card { border-radius: 15px; transition: 0.3s; cursor: pointer; padding: 15px; border: 2px solid transparent; height: 100%; }
        .vote-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .vote-card.selected { border-color: #198754; background-color: #e8f5e9; }
        .candidate-img { width: 120px; height: 120px; object-fit: cover; border-radius: 50%; margin: 0 auto 10px; display: block; border: 3px solid #198754; }
        #loading-spinner { display: flex; justify-content: center; align-items: center; min-height: 200px; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="dashboard.html">NACOS | Voting</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link text-white" href="dashboard.html">Dashboard</a>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <h2 class="text-center mb-4">Official Ballot</h2>

        <!-- Placeholder for Dynamic Content -->
        <div id="loading-spinner">
            <div class="spinner-border text-success" role="status"></div>
            <span class="ms-2">Loading candidates...</span>
        </div>

        <form id="dynamicVotingForm" style="display: none;">
            <div id="ballot-container">
                <!-- Categories and candidates will be injected here -->
            </div>

            <div class="text-center mt-5">
                <button type="submit" id="submitBtn" class="btn btn-success btn-lg px-5">Submit My Vote</button>
            </div>
        </form>
    </div>

    <script>
 // 1. Centralized Configuration
const BASE_URL = 'https://voting-api-guwf.onrender.com';
const API_URL = `${BASE_URL}/api/user/ballot`;

document.addEventListener('DOMContentLoaded', async () => {
    const spinner = document.getElementById('loading-spinner');
    const form = document.getElementById('dynamicVotingForm');
    const voterId = localStorage.getItem('voterId');

    // 2. Auth Check
    if (!voterId) {
        window.location.href = "login.html";
        return;
    }

    try {
        // 3. Fetch data from the LIVE server
        const [ballotRes, myVotesRes] = await Promise.all([
            fetch(API_URL),
            fetch(`${BASE_URL}/api/user/my-vote/${encodeURIComponent(voterId)}`)
        ]);

        const ballotData = await ballotRes.json();
        const myVotesData = await myVotesRes.json();

        let categories = [];
        if (Array.isArray(ballotData.data)) {
            categories = ballotData.data;
        } else if (ballotData.data?.positions) {
            categories = ballotData.data.positions;
        }

        const myVotes = myVotesData.status === "success" ? (myVotesData.data.votes || []) : [];

        renderSmartBallot(categories, myVotes);
        
        spinner.style.display = 'none';
        form.style.display = 'block';

        // 4. Check if ballot is completed
        if (myVotes.length >= categories.length && categories.length > 0) {
            document.getElementById('submitBtn').classList.add('d-none');
            const completionMsg = document.createElement('div');
            completionMsg.className = "alert alert-success text-center mt-4";
            completionMsg.innerHTML = "<h5><i class='fas fa-check-circle'></i> Voting Complete</h5><p>You have cast your votes for all available positions.</p>";
            document.getElementById('ballot-container').appendChild(completionMsg);
        }

    } catch (error) {
        console.error("Initialization Error:", error);
        spinner.innerHTML = `<p class='text-danger'>Error: ${error.message}</p>`;
    }
});

function renderSmartBallot(categories, myVotes) {
    const container = document.getElementById('ballot-container');
    container.innerHTML = ''; 

    categories.forEach(category => {
        const posName = category.positionName || category.name;
        const existingVote = myVotes.find(v => v.positionName === posName);
        const isLocked = !!existingVote;

        const sectionHeader = document.createElement('div');
        sectionHeader.className = `section-title ${isLocked ? 'bg-secondary' : ''}`;
        sectionHeader.innerHTML = `<h4>${posName} ${isLocked ? '✅ (Cast)' : ''}</h4>`;
        container.appendChild(sectionHeader);

        const row = document.createElement('div');
        row.className = 'row g-4 mb-5 mt-1';

        (category.candidates || []).forEach(candidate => {
            const displayName = candidate.name || "Unknown Candidate";
            const isSelectedCandidate = existingVote && (existingVote.candidateName === displayName);
            
            const col = document.createElement('div');
            col.className = 'col-md-4';
            col.innerHTML = `
                <div class="card vote-card text-center ${isSelectedCandidate ? 'selected border-success shadow' : ''} ${isLocked && !isSelectedCandidate ? 'opacity-50' : ''}" 
                     data-locked="${isLocked}" 
                     onclick="handleCardClick(this)">
                    
                    <img src="${candidate.imageUrl || './image/nacos1.png'}" class="candidate-img" alt="${displayName}" onerror="this.src='./image/nacos1.png'">
                    <div class="card-body">
                        <h5 class="fw-bold">${displayName}</h5>
                        ${!isLocked ? `
                            <div class="form-check d-inline-block">
                                <input class="form-check-input" type="radio" name="${category.positionId || category._id}" value="${candidate.candidateId || candidate._id}" required>
                                <label class="form-check-label fw-bold">Select</label>
                            </div>
                        ` : `
                            <div class="mt-2">
                                ${isSelectedCandidate ? '<span class="badge bg-success"><i class="fas fa-check"></i> YOUR VOTE</span>' : '<span class="text-muted small">Locked</span>'}
                            </div>
                        `}
                    </div>
                </div>`;
            row.appendChild(col);
        });
        container.appendChild(row);
    });
}

function handleCardClick(card) {
    if (card.getAttribute('data-locked') === "true") return;

    const radio = card.querySelector('input[type="radio"]');
    if (!radio) return; 

    document.querySelectorAll(`input[name="${radio.name}"]`).forEach(input => {
        input.closest('.vote-card').classList.remove('selected', 'border-success', 'shadow');
    });

    radio.checked = true;
    card.classList.add('selected', 'border-success', 'shadow');
}

// 5. Corrected Submit Listener
document.getElementById('dynamicVotingForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    const voterId = localStorage.getItem('voterId');
    const activeSelections = document.querySelectorAll('input[type="radio"]:checked');
    
    if (activeSelections.length === 0) {
        alert("Please select a candidate to vote.");
        return;
    }

    btn.disabled = true;
    btn.innerHTML = `<span class="spinner-border spinner-border-sm"></span> Submitting...`;

    try {
        // Send all votes to the LIVE server
        for (const radio of activeSelections) {
            const res = await fetch(`${BASE_URL}/api/user/vote`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    participantId: radio.value,
                    voterId: voterId,
                    deviceHash: "web_v1_" + voterId.replace(/\W/g, '_') // Safer regex for hashes
                })
            });
            
            if (!res.ok) {
                const errorData = await res.json();
                throw new Error(errorData.message || "Failed to submit vote");
            }
        }

        alert("Votes submitted successfully!");
        window.location.reload(); 
    } catch (err) {
        console.error("Submit Error:", err);
        alert("Submission Error: " + err.message);
        btn.disabled = false;
        btn.innerText = "Submit My Vote";
    }
});
    </script>
</body>
</html>
