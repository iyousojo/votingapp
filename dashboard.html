<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NACOS Voting Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { background-color: #f4f9f6; }
        .navbar-custom { background-color: #198754; }
        .dashboard-card { border-radius: 12px; transition: 0.3s; height: 100%; }
        .dashboard-card:hover { transform: translateY(-5px); box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1); }
        .welcome-box { background-color: #198754; color: white; border-radius: 12px; padding: 30px; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">NACOS | Computer Science</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link active" href="dashboard.html">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="vote.html">Vote</a></li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link text-warning" href="#" onclick="logout()">
                            <i class="fa-solid fa-right-from-bracket me-1"></i> Logout
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
<div class="container py-5">
        <div class="welcome-box mb-4 shadow-sm">
            <h3 id="welcomeUser">Welcome 👋</h3>
            <p class="mb-0">Participate in the NACOS election and make your vote count.</p>
        </div>

        <div class="row g-4">
            <!-- Election Status -->
            <div class="col-md-4">
                <div class="card dashboard-card p-4 text-center border-0 shadow-sm">
                    <div class="text-success mb-2"><i class="fas fa-vote-yea fa-2x"></i></div>
                    <h6 class="text-muted text-uppercase small fw-bold">Election Status</h6>
                    <p class="text-success fw-bold h5">Voting is Open</p>
                </div>
            </div>
            
            <!-- Voting Progress -->
            <div class="col-md-4">
                <div class="card dashboard-card p-4 text-center border-0 shadow-sm">
                    <div class="text-primary mb-2"><i class="fas fa-tasks fa-2x"></i></div>
                    <h6 class="text-muted text-uppercase small fw-bold">Positions Voted</h6>
                    <p id="progressCount" class="fw-bold h5">Checking...</p>
                </div>
            </div>

            <!-- Total Candidates -->
            <div class="col-md-4">
                <div class="card dashboard-card p-4 text-center border-0 shadow-sm">
                    <div class="text-warning mb-2"><i class="fas fa-users fa-2x"></i></div>
                    <h6 class="text-muted text-uppercase small fw-bold">Total Candidates</h6>
                    <p id="candidateCount" class="fw-bold h5">... Candidates</p>
                </div>
            </div>
        </div>

        <div class="text-center mt-5">
            <a href="vote.html" id="voteBtn" class="btn btn-success btn-lg px-5 py-3 shadow">
                <i class="fas fa-chevron-right me-2"></i>Proceed to Vote
            </a>
            <p id="completionMsg" class="text-muted mt-3 d-none">You have completed all your ballots.</p>
        </div>
    </div>

    <script>
        function logout() {
            localStorage.clear();
            window.location.href = "login.html";
        }

        document.addEventListener('DOMContentLoaded', async () => {
            const voterId = localStorage.getItem('voterId');
            const studentId = localStorage.getItem('studentId') || 'Student';
            
            if (!voterId) {
                window.location.href = 'login.html';
                return;
            }

            document.getElementById('welcomeUser').innerText = `Welcome, ${studentId} 👋`;

            try {
                // 1. Fetch Ballot and User Votes simultaneously
                const [ballotRes, myVotesRes] = await Promise.all([
                    fetch('https://voting-api-guwf.onrender.com/api/user/ballot'),
                    fetch(`https://voting-api-guwf.onrender.com/api/user/my-vote/${encodeURIComponent(voterId)}`)
                ]);

                const ballotData = await ballotRes.json();
                const myVotesData = await myVotesRes.json();

                // 2. Calculate Stats
                const categories = ballotData.data || [];
                const totalCategories = categories.length;
                const totalCandidates = categories.reduce((acc, cat) => acc + (cat.candidates?.length || 0), 0);
                const userVotes = myVotesData.status === "success" ? (myVotesData.data.votes || []) : [];
                const votedCount = userVotes.length;

                // 3. Update UI
                document.getElementById('candidateCount').innerText = `${totalCandidates} Candidates`;
                document.getElementById('progressCount').innerText = `${votedCount} / ${totalCategories}`;

                const voteBtn = document.getElementById('voteBtn');
                
                if (votedCount >= totalCategories && totalCategories > 0) {
                    // Fully Voted
                    voteBtn.classList.replace('btn-success', 'btn-secondary');
                    voteBtn.innerHTML = `<i class="fas fa-check-circle me-2"></i>Voting Complete`;
                    voteBtn.style.pointerEvents = "none";
                    document.getElementById('completionMsg').classList.remove('d-none');
                    localStorage.setItem('hasVoted', 'true');
                } else if (votedCount > 0) {
                    // Partially Voted
                    voteBtn.innerHTML = `<i class="fas fa-play me-2"></i>Continue Voting`;
                    localStorage.setItem('hasVoted', 'false');
                }

            } catch (err) {
                console.error("Dashboard Load Error:", err);
                document.getElementById('progressCount').innerText = "Error Loading";
            }
        });
    </script>
</body>
</html>
