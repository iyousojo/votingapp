<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Add Candidate</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root {
            --sidebar-width: 240px;
        }

        body {
            background-color: #f4f9f6;
            overflow-x: hidden;
        }

        /* Sidebar */
        .sidebar {
            height: 100vh;
            background-color: #198754;
            padding-top: 20px;
            position: fixed;
            width: var(--sidebar-width);
            z-index: 1000;
            transition: 0.3s;
        }

        .sidebar a {
            color: white;
            padding: 12px 20px;
            display: block;
            text-decoration: none;
            transition: 0.3s;
        }

        .sidebar a:hover { background-color: rgba(255, 255, 255, 0.2); }
        .sidebar .active { background-color: rgba(255, 255, 255, 0.3); }

        /* Main Content Area */
        .main-content {
            margin-left: var(--sidebar-width);
            padding: 30px;
            transition: 0.3s;
            min-height: 100vh;
        }

        /* Responsive Sidebar Logic */
        @media (max-width: 991px) {
            .sidebar {
                left: -100%; /* Hide off-screen */
            }
            .sidebar.active-mobile {
                left: 0;
            }
            .main-content {
                margin-left: 0;
                padding: 20px;
            }
            #mobileToggle { display: block !important; }
        }

        .admin-box {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            max-width: 600px;
            margin: 0 auto;
        }

        .admin-title {
            background-color: #198754;
            color: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 25px;
            text-align: center;
        }

        /* Hamburger Toggle */
        #mobileToggle {
            display: none;
            position: fixed;
            top: 15px;
            right: 15px;
            z-index: 1100;
        }

        footer {
            background: #198754;
            color: white;
            margin-top: 50px;
        }
    </style>
</head>

<body>

    <!-- MOBILE TOGGLE -->
    <button id="mobileToggle" class="btn btn-success">
        <i class="fa-solid fa-bars"></i>
    </button>

    <!-- SIDEBAR -->
    <div class="sidebar" id="sidebar">
        <h4 class="text-white text-center mb-4">NACOS Admin</h4>
        <a href="dashboard.html"><i class="fa-solid fa-gauge me-2"></i> Dashboard</a>
        <a href="form.html" class="active"><i class="fa-solid fa-user-plus me-2"></i> Add Candidate</a>
        <a href="categories.html"><i class="fa-solid fa-list me-2"></i> Categories</a>
        <a href="result.html"><i class="fa-solid fa-chart-column me-2"></i> View Results</a>
        <a href="javascript:void(0)" onclick="logout()">
            <i class="fa-solid fa-right-from-bracket me-2"></i> Logout
        </a>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main-content">
        <div class="container-fluid">
            <div class="row justify-content-center">
                <div class="col-12 col-xl-8">
                    <div class="admin-box mt-4">
                        <div class="admin-title">
                            <h4 class="mb-0">Add Candidate</h4>
                        </div>

                        <form id="addCandidateForm">
                            <div class="mb-3">
                                <label class="form-label fw-bold">Candidate Name</label>
                                <input type="text" id="name" class="form-control form-control-lg" placeholder="Enter full name" required>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold">Level</label>
                                    <select id="level" class="form-select" required>
                                        <option value="">Select Level</option>
                                        <option value="100L">100 Level</option>
                                        <option value="200L">200 Level</option>
                                        <option value="300L">300 Level</option>
                                        <option value="400L">400 Level</option>
                                    </select>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold">Position</label>
                                    <select id="categoryKey" class="form-select" required>
                                        <option value="">Loading...</option>
                                    </select>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">Manifesto</label>
                                <textarea id="manifesto" class="form-control" rows="4" placeholder="I promise to..." required></textarea>
                            </div>

                            <div class="mb-4">
                                <label class="form-label fw-bold">Profile Image</label>
                                <input type="file" id="profileImage" class="form-control" accept="image/*" required>
                            </div>

                            <div class="d-grid">
                                <button type="submit" class="btn btn-success btn-lg" id="submitBtn">
                                    Add Candidate
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="py-4 text-center">
        <p class="mb-0">&copy; 2026 NACOS Computer Science. All rights reserved.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
   <script>
    const token = localStorage.getItem('adminToken');
    const API_BASE_URL = 'https://voting-api-guwf.onrender.com/api'; // Updated to your production URL

    if (!token) {
        window.location.href = 'login.html';
    }

    // Sidebar Toggle for Mobile
    const toggleBtn = document.getElementById('mobileToggle');
    const sidebar = document.getElementById('sidebar');
    toggleBtn.addEventListener('click', () => {
        sidebar.classList.toggle('active-mobile');
    });

    document.querySelector('.main-content').addEventListener('click', () => {
        sidebar.classList.remove('active-mobile');
    });

    async function loadPageData() {
        const categorySelect = document.getElementById('categoryKey');
        const submitBtn = document.getElementById('submitBtn');
        const formFields = document.querySelectorAll('#addCandidateForm input, #addCandidateForm select, #addCandidateForm textarea');

        try {
            // 1. Check Election Status
            const dashRes = await fetch(`${API_BASE_URL}/admin/dashboard`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const dData = await dashRes.json();
            const isElectionActive = dData.results.electionStatus === "Active" || dData.results.electionStatus === "Open";

            // 2. Load Categories
            const response = await fetch(`${API_BASE_URL}/admin/categories`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const result = await response.json();

            if (result.status === "success") {
                categorySelect.innerHTML = '<option value="">Select Position</option>';
                result.data.forEach(cat => {
                    const option = document.createElement('option');
                    option.value = cat.key; 
                    option.textContent = cat.name;
                    categorySelect.appendChild(option);
                });
            }

            // 3. UI LOCK: Disable form if election is active
            if (isElectionActive) {
                submitBtn.disabled = true;
                submitBtn.classList.replace('btn-success', 'btn-secondary');
                submitBtn.innerHTML = `<i class="fa-solid fa-lock me-2"></i> Locked During Election`;
                
                formFields.forEach(field => {
                    field.disabled = true;
                });
            }

        } catch (error) {
            console.error("Initialization error:", error);
            categorySelect.innerHTML = '<option value="">Error loading</option>';
        }
    }

    // Call initialization
    loadPageData();

    document.getElementById('addCandidateForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const submitBtn = document.getElementById('submitBtn');
        
        // Prevent submission if locked (extra safety)
        if (submitBtn.disabled) return;

        submitBtn.disabled = true;
        submitBtn.innerText = "Uploading...";

        const formData = new FormData();
        formData.append('name', document.getElementById('name').value);
        formData.append('level', document.getElementById('level').value);
        formData.append('categoryKey', document.getElementById('categoryKey').value);
        formData.append('manifesto', document.getElementById('manifesto').value);
        formData.append('profileImage', document.getElementById('profileImage').files[0]);

        try {
            const response = await fetch(`${API_BASE_URL}/admin/participants`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}` },
                body: formData
            });

            const result = await response.json();
            if (response.ok) {
                alert("Candidate added successfully!");
                document.getElementById('addCandidateForm').reset();
            } else {
                alert("Error: " + result.message);
            }
        } catch (error) {
            alert("Server connection failed.");
        } finally {
            // Check again if it should be re-enabled
            if (!submitBtn.innerHTML.includes('Locked')) {
                submitBtn.disabled = false;
                submitBtn.innerText = "Add Candidate";
            }
        }
    });

    function logout() {
        if(confirm("Are you sure?")) {
            localStorage.removeItem('adminToken');
            window.location.href = 'login.html'; 
        }
    }
</script>
</body>
</html>
