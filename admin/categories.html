<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Manage Categories</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --sidebar-width: 240px; }
        body { background-color: #f4f9f6; overflow-x: hidden; }

        /* Sidebar Styles */
        .sidebar { 
            height: 100vh; 
            background-color: #198754; 
            padding-top: 20px; 
            position: fixed; 
            width: var(--sidebar-width); 
            z-index: 1000;
            transition: 0.3s;
        }
        .sidebar a { color: white; padding: 12px 20px; display: block; text-decoration: none; transition: 0.3s; }
        .sidebar a:hover { background-color: rgba(255, 255, 255, 0.2); }
        .sidebar .active { background-color: rgba(255, 255, 255, 0.3); }

        /* Content Layout */
        .main-content { 
            margin-left: var(--sidebar-width); 
            padding: 30px; 
            transition: 0.3s;
        }

        /* Mobile Adjustments */
        #mobileToggle {
            display: none;
            position: fixed;
            top: 15px;
            right: 15px;
            z-index: 1100;
        }

        @media (max-width: 991px) {
            .sidebar { left: -100%; }
            .sidebar.active-mobile { left: 0; }
            .main-content { margin-left: 0; padding: 20px; padding-top: 60px; }
            #mobileToggle { display: block; }
        }

        .admin-box { 
            background: white; 
            padding: 25px; 
            border-radius: 15px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
            margin-bottom: 20px; 
        }
        .admin-title { 
            background-color: #198754; 
            color: white; 
            padding: 10px; 
            border-radius: 8px; 
            text-align: center; 
            margin-bottom: 20px; 
        }

        /* Table Responsiveness */
        .table-responsive { border-radius: 10px; }
    </style>
</head>
<body>

    <!-- MOBILE TOGGLE -->
    <button id="mobileToggle" class="btn btn-success">
        <i class="fa-solid fa-bars"></i>
    </button>

    <!-- SIDEBAR -->
    <div class="sidebar" id="sidebar">
        <h4 class="text-white text-center mb-4">NACOS Admin</h4>
        <a href="dashboard.html"><i class="fa-solid fa-gauge me-2"></i> Dashboard</a>
        <a href="form.html"><i class="fa-solid fa-user-plus me-2"></i> Add Candidate</a>
        <a href="#" class="active"><i class="fa-solid fa-list me-2"></i> Categories</a>
        <a href="result.html"><i class="fa-solid fa-chart-column me-2"></i> View Results</a>
        <a href="javascript:void(0)" onclick="logout()"><i class="fa-solid fa-right-from-bracket me-2"></i> Logout</a>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main-content">
        <div class="container-fluid">
            <div class="row">
                <!-- FORM COLUMN -->
                <div class="col-lg-5 col-md-12">
                    <div class="admin-box">
                        <div class="admin-title"><h4>Create Category</h4></div>
                        <form id="categoryForm">
                            <div class="mb-3">
                                <label class="form-label fw-bold">Category Name</label>
                                <input type="text" id="catName" class="form-control" placeholder="e.g. Secretary General" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Category Key</label>
                                <input type="text" id="catKey" class="form-control" placeholder="e.g. sec_gen" required>
                                <small class="text-muted">Lowercase, no spaces (use underscores).</small>
                            </div>
                            <button type="submit" class="btn btn-success w-100 py-2" id="saveBtn">Create Category</button>
                        </form>
                    </div>
                </div>

                <!-- LIST COLUMN -->
                <div class="col-lg-7 col-md-12">
                    <div class="admin-box">
                        <div class="admin-title"><h4>Existing Positions</h4></div>
                        <div class="table-responsive">
                            <table class="table table-hover align-middle">
                                <thead class="table-light">
                                    <tr>
                                        <th>Name</th>
                                        <th>Key</th>
                                        <th class="text-end">Action</th>
                                    </tr>
                                </thead>
                                <tbody id="categoryTableBody">
                                    <tr><td colspan="3" class="text-center">Loading...</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

 <script>
    const token = localStorage.getItem('adminToken');
    if (!token) window.location.href = 'login.html';

    // --- MOBILE SIDEBAR LOGIC ---
    const mobileToggle = document.getElementById('mobileToggle');
    const sidebar = document.getElementById('sidebar');
    
    mobileToggle.addEventListener('click', () => {
        sidebar.classList.toggle('active-mobile');
    });

    document.addEventListener('click', (e) => {
        if (!sidebar.contains(e.target) && !mobileToggle.contains(e.target) && sidebar.classList.contains('active-mobile')) {
            sidebar.classList.remove('active-mobile');
        }
    });

    // --- FETCH CATEGORIES & CHECK ELECTION STATUS ---
    async function loadCategories() {
        try {
            // Fetch dashboard data to check election status
            const dashRes = await fetch('https://voting-api-guwf.onrender.com/api/admin/dashboard', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const dData = await dashRes.json();
            const isElectionActive = dData.results.electionStatus === "Active" || dData.results.electionStatus === "Open";

            const response = await fetch('https://voting-api-guwf.onrender.com/api/admin/categories', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const result = await response.json();
            
            const categories = result.data || [];
            const tableBody = document.getElementById('categoryTableBody');
            const saveBtn = document.getElementById('saveBtn');
            const catForm = document.getElementById('categoryForm');

            // UI LOCK: If election is active, disable the form
            if (isElectionActive) {
                saveBtn.disabled = true;
                saveBtn.classList.replace('btn-success', 'btn-secondary');
                saveBtn.innerHTML = `<i class="fa-solid fa-lock me-1"></i> Locked During Election`;
                
                // Disable inputs
                document.getElementById('catName').disabled = true;
                document.getElementById('catKey').disabled = true;
            }

            if (categories.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="3" class="text-center text-muted">No categories found.</td></tr>';
                return;
            }

            tableBody.innerHTML = categories.map(cat => `
                <tr>
                    <td class="fw-bold">${cat.name}</td>
                    <td><span class="badge bg-light text-dark border">${cat.key}</span></td>
                    <td class="text-end">
                        <button class="btn btn-outline-danger btn-sm" 
                                ${isElectionActive ? 'disabled' : ''} 
                                onclick="deleteCategory('${cat._id}')">
                            <i class="fa-solid ${isElectionActive ? 'fa-lock' : 'fa-trash'}"></i>
                        </button>
                    </td>
                </tr>`).join('');

        } catch (err) { 
            console.error("Load failed:", err);
        }
    }

    // --- DELETE CATEGORY ---
    async function deleteCategory(id) {
        if(!confirm("Are you sure? This may affect candidates in this category.")) return;
        
        try {
            const response = await fetch(`https://voting-api-guwf.onrender.com/api/admin/categories/${id}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${token}` }
            });

            if (response.ok) {
                loadCategories();
            } else {
                const err = await response.json();
                alert(err.message || "Failed to delete category.");
            }
        } catch (err) { alert("Error deleting category"); }
    }

    // --- CREATE CATEGORY ---
    document.getElementById('categoryForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const saveBtn = document.getElementById('saveBtn');
        
        const categoryData = {
            name: document.getElementById('catName').value,
            key: document.getElementById('catKey').value.toLowerCase().replace(/\s+/g, '_').trim()
        };

        saveBtn.disabled = true;
        saveBtn.innerText = "Creating...";

        try {
            const response = await fetch('https://voting-api-guwf.onrender.com/api/admin/categories', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify(categoryData)
            });

            if (response.ok) {
                document.getElementById('categoryForm').reset();
                loadCategories();
            } else {
                const err = await response.json();
                alert("Error: " + err.message);
            }
        } catch (err) { alert("Server error"); } 
        finally { 
            // Only re-enable if text wasn't changed to "Locked" by loadCategories
            if (saveBtn.innerText !== "Locked During Election") {
                saveBtn.disabled = false; 
                saveBtn.innerText = "Create Category";
            }
        }
    });

    function logout() {
        localStorage.removeItem('adminToken');
        window.location.href = 'login.html';
    }

    loadCategories();
</script>
</body>
</html>
