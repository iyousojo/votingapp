<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Registration - NACOS Elections</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .loader { border-top-color: #3498db; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-900 flex items-center justify-center h-screen px-4">
    
    <!-- Notification Toast -->
    <div id="toast" class="fixed top-5 right-5 transform translate-x-full transition-transform duration-300 z-50 p-4 rounded-lg shadow-lg text-white hidden"></div>

    <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md border-t-4 border-blue-600">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-extrabold text-gray-800">Admin Portal</h2>
            <p class="text-gray-500 mt-2">Create a new administrative account</p>
        </div>

        <form id="registerForm" class="space-y-5">
            <!-- Username -->
            <div>
                <label class="block text-sm font-semibold text-gray-700">Username</label>
                <div class="relative mt-1">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                        <i class="fas fa-user"></i>
                    </span>
                    <input type="text" id="username" placeholder="e.g. nacos_admin" 
                        class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none transition" required>
                </div>
            </div>

            <!-- Password -->
            <div>
                <label class="block text-sm font-semibold text-gray-700">Password</label>
                <div class="relative mt-1">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                        <i class="fas fa-lock"></i>
                    </span>
                    <input type="password" id="password" placeholder="••••••••" 
                        class="w-full pl-10 pr-10 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none transition" required>
                    <button type="button" onclick="togglePassword('password')" class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-blue-500">
                        <i class="fas fa-eye" id="eyeIcon"></i>
                    </button>
                </div>
                <div id="pw-strength" class="mt-2 h-1 w-0 bg-red-500 transition-all duration-300 rounded"></div>
            </div>

            <!-- Admin Secret -->
            <div>
                <label class="block text-sm font-semibold text-red-600 flex items-center gap-2">
                    <i class="fas fa-key"></i> System Secret Key
                </label>
                <input type="password" id="adminSecret" placeholder="Enter security clearance key" 
                    class="w-full mt-1 px-4 py-2 border-2 border-red-50 border-dashed rounded-lg bg-red-50 focus:border-red-400 focus:outline-none transition text-red-700 font-mono" required>
            </div>

            <!-- Submit Button -->
            <button type="submit" id="submitBtn" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transform hover:-translate-y-1 transition-all active:scale-95 flex items-center justify-center gap-2">
                <span>Register Admin</span>
                <div id="btnLoader" class="hidden loader w-5 h-5 border-2 border-white rounded-full"></div>
            </button>
        </form>

        <div class="mt-6 text-center">
            <p class="text-sm text-gray-600">Already part of the team? 
                <a href="login.html" class="text-blue-600 font-bold hover:underline">Login here</a>
            </p>
        </div>
    </div>

    <script>
        // 1. Toggle Password Visibility
        function togglePassword(id) {
            const input = document.getElementById(id);
            const icon = document.getElementById('eyeIcon');
            if (input.type === "password") {
                input.type = "text";
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = "password";
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        // 2. Simple Password Strength Indicator
        document.getElementById('password').addEventListener('input', (e) => {
            const strengthBar = document.getElementById('pw-strength');
            const val = e.target.value;
            if (val.length === 0) strengthBar.style.width = '0%';
            else if (val.length < 6) { strengthBar.style.width = '30%'; strengthBar.className = 'mt-2 h-1 bg-red-500 rounded'; }
            else if (val.length < 10) { strengthBar.style.width = '60%'; strengthBar.className = 'mt-2 h-1 bg-yellow-500 rounded'; }
            else { strengthBar.style.width = '100%'; strengthBar.className = 'mt-2 h-1 bg-green-500 rounded'; }
        });

        // 3. Custom Toast Notification
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.innerText = message;
            toast.className = `fixed top-5 right-5 z-50 p-4 rounded-lg shadow-lg text-white transition-all duration-300 transform translate-x-0 ${type === 'success' ? 'bg-green-600' : 'bg-red-600'}`;
            toast.classList.remove('hidden');
            
            setTimeout(() => {
                toast.classList.add('translate-x-full');
                setTimeout(() => toast.classList.add('hidden'), 300);
            }, 4000);
        }

        // 4. Form Submission
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const btnLoader = document.getElementById('btnLoader');
            
            // UI State: Loading
            btn.disabled = true;
            btn.classList.add('opacity-70', 'cursor-not-allowed');
            btnLoader.classList.remove('hidden');

            const data = {
                username: document.getElementById('username').value,
                password: document.getElementById('password').value,
                adminSecret: document.getElementById('adminSecret').value
            };

            try {
                const response = await fetch('https://voting-api-guwf.onrender.com/api/admin/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (response.ok) {
                    showToast("Admin account created successfully! Redirecting...", 'success');
                    setTimeout(() => window.location.href = 'login.html', 2000);
                } else {
                    showToast(result.message || "Registration failed", 'error');
                }
            } catch (err) {
                showToast("Connection error. Is the server running?", 'error');
            } finally {
                // UI State: Reset
                btn.disabled = false;
                btn.classList.remove('opacity-70', 'cursor-not-allowed');
                btnLoader.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
